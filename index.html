  <style>
    body {
      background: radial-gradient(circle at 50% 30%, #17171a 0%, #020202 100%) fixed;
      color: #f5f5f7;
      overflow-x: hidden;
      font-family: 'JetBrains Mono', monospace;
    }

    .marquee {
      display: flex;
      overflow: hidden;
      user-select: none;
      gap: 2rem;
      border-top: 1px solid #262626;
      padding-top: 1rem;
    }

    .marquee-content {
      flex-shrink: 0;
      display: flex;
      justify-content: space-around;
      gap: 2rem;
      min-width: 100%;
      animation: scroll 20s linear infinite;
    }

    @keyframes scroll {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-100%);
      }
    }

    .text-outline {
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.25);
      color: transparent;
    }

    .hover-reveal-image {
      position: fixed;
      width: 300px;
      height: 400px;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
      transform: translate(-50%, -50%);
    }

    .service-line:hover .hover-reveal-image {
      opacity: 1;
    }

    /* Custom scrollbar for brutalist feel */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #040405;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #ffffff 0%, #444446 100%);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #ffffff 0%, #636366 100%);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .active-tab {
      background: linear-gradient(90deg, #ffffff 0%, #e5e5e5 100%);
      color: #000000;
    }

    .neon-border-hover:hover {
      border-color: #ffffff;
    }

    .technical-divider {
      height: 1px;
      background-color: #262626;
      width: 100%;
    }
  </style>
